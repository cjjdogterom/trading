name: Dagelijkse research & trading

# Draait elke handelsdag. 14:00 UTC ≈ 10:00 New York (zomertijd) / 09:00 (wintertijd).
# Pas de tijd aan naar wens; GitHub-cron is altijd in UTC.
on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch: {}        # handmatig starten kan ook via de Actions-tab

# Nodig om de snapshot.json terug te committen voor het dashboard.
permissions:
  contents: write

# Voorkom dat twee runs tegelijk handelen.
concurrency:
  group: daily-trading
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies
        run: pip install -r requirements-bot.txt

      - name: Dagelijkse run
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}          # 'true' (paper) of 'false' (live)
          ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}  # iex of sip
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optioneel: Claude-sentiment
          SENTIMENT_MODEL: ${{ secrets.SENTIMENT_MODEL }}      # optioneel
          EXECUTE: ${{ secrets.EXECUTE }}                      # 'true' = orders plaatsen
          ALLOW_LIVE_AUTOTRADE: ${{ secrets.ALLOW_LIVE_AUTOTRADE }}  # 'true' vereist voor LIVE
        run: python daily_run.py

      - name: Snapshot committen (voor het dashboard)
        run: |
          git config user.name "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshot.json
          git commit -m "data: dagelijkse research snapshot [skip ci]" || echo "geen wijziging"
          git push
